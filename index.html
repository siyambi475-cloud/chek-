<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tushar Tech Zone</title>

  <script src='//libtl.com/sdk.js' data-zone='8690632' data-sdk='show_8690632'></script>
  <script type='text/javascript' src='//planetsrecipe.com/f5/2e/60/f52e603c68e6e01cac72d54c5068a32b.js'></script>
  <script type='text/javascript' src='//planetsrecipe.com/43/1c/76/431c7601682412583e98b4877f808917.js'></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #ffffff; }
    .card-bg { background-color: #1e293b; border: 1px solid #334155; }
    .btn-accent { background: linear-gradient(90deg, #f59e0b, #d97706); color: #000; font-weight: 800; }
    .input-field { background-color: #0f172a; border: 1px solid #334155; color: white; outline: none; }
    .input-field:focus { border-color: #f59e0b; }
    .main-page { display: none; }
    .main-page.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease-in; }
    .sub-page { display: none; }
    .sub-page.active { display: block; animation: slideUp 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>

<body class="max-w-md mx-auto min-h-screen">

  <div id="loader" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-amber-500"></div>
  </div>

  <div id="timer-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-6">
    <div class="card-bg rounded-3xl p-10 w-full text-center border-amber-500">
      <h3 class="text-2xl font-bold mb-4 text-amber-500">টাস্ক চলছে...</h3>
      <div class="text-7xl font-black mb-4 text-white" id="countdown-display">20</div>
    </div>
  </div>

  <div id="auth-section" class="min-h-screen p-8 justify-center main-page active">
    <div class="text-center mb-10"><h1 class="text-4xl font-black text-amber-500">TUSHAR TECH</h1></div>
    <div id="login-view" class="space-y-4">
      <input id="login-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl input-field">
      <input id="login-password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl input-field">
      <button id="login-btn" class="w-full p-4 rounded-2xl btn-accent">LOGIN</button>
      <p class="text-center text-slate-400">Account নেই? <button id="go-signup" class="text-amber-500 font-bold">Sign Up</button></p>
    </div>
    <div id="signup-view" class="hidden space-y-4">
      <input id="signup-name" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl input-field">
      <input id="signup-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl input-field">
      <input id="signup-password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl input-field">
      <button id="signup-btn" class="w-full p-4 rounded-2xl btn-accent">CREATE ACCOUNT</button>
      <p class="text-center text-slate-400">Account আছে? <button id="go-login" class="text-amber-500 font-bold">Login</button></p>
    </div>
  </div>

  <div id="app-container" class="min-h-screen main-page">
    <header class="p-6 flex justify-between items-center bg-slate-900 sticky top-0 z-10">
      <h1 class="font-black text-xl text-amber-500">TUSHAR TECH</h1>
      <div class="bg-amber-500/10 px-4 py-1 rounded-full border border-amber-500/20">
        <span id="user-balance" class="font-black text-amber-500">0</span> <small>Coins</small>
      </div>
    </header>

    <main class="p-6 space-y-6 flex-grow pb-24">
      <div id="home-page" class="sub-page active space-y-4">
        <div class="card-bg p-5 rounded-3xl flex justify-between items-center">
          <div><h3 class="font-bold">Video Ad</h3><p class="text-xs text-slate-400">Reward: 50 Coins</p></div>
          <button onclick="playVideoAd()" class="bg-amber-500 text-black font-bold px-6 py-2 rounded-xl text-xs">PLAY</button>
        </div>
        <div class="card-bg p-5 rounded-3xl flex justify-between items-center">
          <div><h3 class="font-bold">Visit Website</h3><p class="text-xs text-slate-400">Reward: 30 Coins</p></div>
          <button onclick="startWebTask('https://iqxltd.blogspot.com', 20)" class="border border-amber-500 text-amber-500 font-bold px-6 py-2 rounded-xl text-xs">VISIT</button>
        </div>
      </div>

      <div id="wallet-page" class="sub-page space-y-6">
        <div class="card-bg p-6 rounded-3xl text-center">
          <p class="text-slate-400 text-sm">Available Balance</p>
          <h2 id="wallet-balance" class="text-4xl font-black text-amber-500">0</h2>
        </div>
        
        <div class="card-bg p-6 rounded-3xl space-y-4">
          <h3 class="font-bold text-center">Withdraw Coins</h3>
          <select id="method" class="w-full p-4 rounded-xl input-field">
            <option value="Bkash">Bkash</option>
            <option value="Nagad">Nagad</option>
          </select>
          <input id="number" type="number" placeholder="Number (017...)" class="w-full p-4 rounded-xl input-field">
          <input id="amount" type="number" placeholder="Amount (Min: 5000)" class="w-full p-4 rounded-xl input-field">
          <button onclick="submitWithdraw()" class="w-full p-4 rounded-xl btn-accent">SUBMIT REQUEST</button>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md grid grid-cols-3 p-4 bg-slate-900 border-t border-slate-800">
      <button onclick="showSubPage('home-page')" class="flex flex-col items-center gap-1 text-amber-500"><i data-lucide="home"></i></button>
      <button onclick="showSubPage('wallet-page')" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="wallet"></i></button>
      <button onclick="handleLogout()" class="flex flex-col items-center gap-1 text-slate-400"><i data-lucide="log-out"></i></button>
    </nav>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyDB15lIz0BwUaErArj-ooETB79iPCZK3D4",
      authDomain: "bot-864b3.firebaseapp.com",
      projectId: "bot-864b3",
      storageBucket: "bot-864b3.firebasestorage.app",
      messagingSenderId: "82198701869",
      appId: "1:82198701869:web:3c099992e1c64e285355a4"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userRef = null;
    let currentBalance = 0;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        if (!snap.exists()) await setDoc(userRef, { name: user.displayName || "User", balance: 0, email: user.email });
        sync();
        toggle('app-container');
      } else {
        toggle('auth-section');
      }
    });

    async function sync() {
      const snap = await getDoc(userRef);
      if(snap.exists()) {
        currentBalance = snap.data().balance;
        document.getElementById('user-balance').textContent = currentBalance;
        document.getElementById('wallet-balance').textContent = currentBalance;
      }
      lucide.createIcons();
    }

    // Withdraw Logic
    window.submitWithdraw = async () => {
      const method = document.getElementById('method').value;
      const number = document.getElementById('number').value;
      const amount = parseInt(document.getElementById('amount').value);

      if(!number || !amount) return alert("সব তথ্য দিন!");
      if(amount < 5000) return alert("কমপক্ষে ৫০০০ কয়েন লাগবে!");
      if(amount > currentBalance) return alert("আপনার ব্যালেন্স কম!");

      showLoader(true);
      try {
        // ১. ব্যালেন্স কমানো
        await updateDoc(userRef, { balance: increment(-amount) });
        // ২. রিকোয়েস্ট ডাটাবেসে পাঠানো
        await addDoc(collection(db, "withdrawals"), {
          uid: auth.currentUser.uid,
          email: auth.currentUser.email,
          method,
          number,
          amount,
          status: "Pending",
          time: serverTimestamp()
        });
        alert("Withdraw Request Successful!");
        sync();
      } catch (e) { alert("Error: " + e.message); }
      showLoader(false);
    };

    // Task Logic
    window.playVideoAd = async () => {
      if (typeof window.show_8690632 === 'function') {
        showLoader(true);
        await window.show_8690632();
        await updateDoc(userRef, { balance: increment(50) });
        sync();
        showLoader(false);
      } else alert("Ad loading...");
    };

    window.startWebTask = (url, sec) => {
      window.open(url, '_blank');
      let c = sec;
      document.getElementById('timer-modal').classList.remove('hidden');
      const t = setInterval(async () => {
        c--;
        document.getElementById('countdown-display').textContent = c;
        if(c <= 0) {
          clearInterval(t);
          document.getElementById('timer-modal').classList.add('hidden');
          await updateDoc(userRef, { balance: increment(30) });
          sync();
          alert("30 Coins Added!");
        }
      }, 1000);
    };

    // UI Helpers
    window.showSubPage = (id) => {
      document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    };
    window.handleLogout = () => signOut(auth);
    function toggle(id) {
      document.querySelectorAll('.main-page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function showLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

    document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value).catch(err => alert(err.message));
    document.getElementById('signup-btn').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('signup-email').value, document.getElementById('signup-password').value).then(r => updateProfile(r.user, {displayName: document.getElementById('signup-name').value})).catch(err => alert(err.message));
    document.getElementById('go-signup').onclick = () => { document.getElementById('login-view').classList.add('hidden'); document.getElementById('signup-view').classList.remove('hidden'); };
    document.getElementById('go-login').onclick = () => { document.getElementById('signup-view').classList.add('hidden'); document.getElementById('login-view').classList.remove('hidden'); };
  </script>
</body>
  </html>
